<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meshumar Tech</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon_1024.png">

    <style>
        :root {
            --gold: #997F33;
            --green: #34C759;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --secondary: #8E8E93;
            --terminal-bg: #0A0A0A;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: #1C1C1E;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
            position: fixed;
            touch-action: none; 
        }

        .managed-banner {
            width: 100%;
            background: #E5E5EA;
            color: #636366;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 12px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 20px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            fill: var(--gold);
            margin-bottom: 15px;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hebrew-status {
            color: var(--green);
            font-size: 42px;
            font-weight: 800;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 12px;
            background: rgba(52, 199, 89, 0.1);
            color: var(--green);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .info-card {
            width: 90%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin: 20px 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid #F2F2F7;
        }

        .detail-row:last-child { border-bottom: none; }
        .label { color: var(--secondary); font-size: 14px; }
        .value { color: #1C1C1E; font-size: 14px; font-weight: 600; }

        /* FIXED TERMINAL LOGS */
        .terminal {
            width: 90%;
            background: var(--terminal-bg);
            border-radius: 12px;
            padding: 12px;
            font-family: 'SF Mono', monospace;
            font-size: 10px;
            color: #00FF41;
            height: 120px;
            display: flex;
            flex-direction: column;
        }

        #logs {
            flex: 1;
            overflow-y: hidden; /* JavaScript will handle the "scroll to bottom" */
            line-height: 1.4;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #00FF41;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* FIXED FOOTER */
        .footer {
            width: 100%;
            padding: 15px 20px 30px 20px; /* Extra bottom padding for iPhone home bar */
            text-align: center;
            color: var(--secondary);
            font-size: 11px;
            background: var(--bg);
        }
    </style>
</head>
<body>

    <div class="managed-banner">Managed by Meshumar Enterprise</div>

    <div class="main-content">
        <svg class="shield-icon" viewBox="0 0 24 24">
            <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.99h7c-.47 4.29-3.14 8.1-7 9.3V12H5V6.3l7-3.11v8.8z"/>
        </svg>

        <h1 class="hebrew-status">משומר</h1>
        <div class="status-badge">PROTECTION ENABLED</div>

        <div class="info-card">
            <div class="detail-row"><span class="label">Policy</span><span class="value">Strict_Research_v6</span></div>
            <div class="detail-row"><span class="label">Status</span><span class="value" style="color:var(--green)">Active/Locked</span></div>
            <div class="detail-row"><span class="label">Session</span><span class="value" id="uptime">0s</span></div>
        </div>

        <div class="terminal">
            <div id="logs">
                <div style="margin-bottom:2px">0x1A4F [SYS] Initialization...</div>
                <div style="margin-bottom:2px">0xDE21 [NET] Secure Tunnel UP</div>
            </div>
            <div style="color: #FFF; border-top: 1px solid #333; padding-top: 4px; margin-top: auto;">
                root@meshumar:~$ <span class="cursor"></span>
            </div>
        </div>
    </div>

    <div class="footer">
        <strong>Org ID:</strong> MSH-ENT-2026-SEARCH-TECH<br>
        70,000 Word Progress Tracking Active
    </div>

    <script>
        // Disable scroll
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        // Uptime
        let sec = 0;
        setInterval(() => {
            sec++;
            document.getElementById('uptime').innerText = sec + 's';
        }, 1000);

        // Terminal Log Management
        const logBox = document.getElementById('logs');
        setInterval(() => {
            const hex = "0x" + Math.floor(Math.random()*0xFFFF).toString(16).toUpperCase();
            const logEntry = document.createElement('div');
            logEntry.style.marginBottom = "2px";
            logEntry.innerHTML = `${hex} [FILTER] Packet inspected...`;
            logBox.appendChild(logEntry);

            // AUTO-PURGE old logs so they never overflow the box
            if (logBox.children.length > 5) {
                logBox.removeChild(logBox.firstChild);
            }
        }, 3500);
    </script>
</body>
</html>
