<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meshumar Tech</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon_1024.png">

    <style>
        :root {
            --gold: #997F33;
            --green: #34C759;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --secondary: #8E8E93;
            --terminal-bg: #0A0A0A;
        }

        /* RESET & LOCK SCROLLING */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: #1C1C1E;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            
            /* The Lockdown */
            overflow: hidden;
            position: fixed;
            touch-action: none; 
        }

        .managed-banner {
            width: 100%;
            background: #E5E5EA;
            color: #636366;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 12px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding-top: 30px;
        }

        .shield-container {
            position: relative;
            margin-bottom: 20px;
        }

        .shield-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(153,127,51,0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .shield-icon {
            width: 90px;
            height: 90px;
            fill: var(--gold);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .hebrew-status {
            color: var(--green);
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(52, 199, 89, 0.1);
            color: var(--green);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .info-card {
            width: 90%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #F2F2F7;
        }

        .detail-row:last-child { border-bottom: none; }

        .label { color: var(--secondary); font-size: 14px; }
        .value { color: #1C1C1E; font-size: 14px; font-weight: 600; }

        .terminal {
            width: 90%;
            background: var(--terminal-bg);
            border-radius: 12px;
            padding: 12px;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            font-size: 10px;
            color: #00FF41;
            height: 100px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #00FF41;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .footer {
            padding: 20px;
            text-align: center;
            color: var(--secondary);
            font-size: 11px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="managed-banner">Enforced by Meshumar Enterprise</div>

    <div class="main-content">
        <div class="shield-container">
            <div class="shield-glow"></div>
            <svg class="shield-icon" viewBox="0 0 24 24">
                <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.99h7c-.47 4.29-3.14 8.1-7 9.3V12H5V6.3l7-3.11v8.8z"/>
            </svg>
        </div>

        <div class="status-header">
            <h1 class="hebrew-status">מְשׁוּמָר</h1>
            <div class="status-badge">ACTIVE FILTER</div>
        </div>

        <div class="info-card">
            <div class="detail-row"><span class="label">Policy</span><span class="value">Strict_Research_v5</span></div>
            <div class="detail-row"><span class="label">Status</span><span class="value" style="color:var(--green)">Locked (תַּקִין)</span></div>
            <div class="detail-row"><span class="label">Session</span><span class="value" id="uptime">0s</span></div>
        </div>

        <div class="terminal" id="terminal">
            <div id="logs">
                <div style="margin-bottom:4px">0x4F1A [SYSTEM] Protocol Init...</div>
                <div style="margin-bottom:4px">0xBD22 [NETWORK] Tunneling Active</div>
            </div>
            <div style="color: #FFF; margin-top: 5px;">root@meshumar:~$ <span class="cursor"></span></div>
        </div>
    </div>

    <div class="footer">
        Organization ID: MSH-2026-X<br>
        70k Manuscript Mode Enabled
    </div>

    <script>
        // LOCK THE SCREEN FROM BOUNCING
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Uptime Counter
        let sec = 0;
        setInterval(() => {
            sec++;
            document.getElementById('uptime').innerText = sec + 's';
        }, 1000);

        // Simulated Random Memory Addresses
        setInterval(() => {
            const logs = document.getElementById('logs');
            const hex = "0x" + Math.floor(Math.random()*0xFFFF).toString(16).toUpperCase();
            const newLine = document.createElement('div');
            newLine.style.marginBottom = "4px";
            newLine.innerHTML = `${hex} [FILTER] Re-evaluating...`;
            logs.appendChild(newLine);
            if(logs.children.length > 3) logs.removeChild(logs.firstChild);
        }, 4000);
    </script>
</body>
</html>
