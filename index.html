<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meshumar Tech</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon_1024.png">

    <style>
        :root {
            --gold: #997F33;
            --green: #34C759;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --secondary: #8E8E93;
            --terminal-bg: #0A0A0A;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: #1C1C1E;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
            position: fixed;
            touch-action: none; 
        }

        .managed-banner {
            width: 100%;
            background: #E5E5EA;
            color: #636366;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 12px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 25px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            fill: var(--gold);
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .hebrew-status {
            color: var(--green);
            font-size: 42px;
            font-weight: 800;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 12px;
            background: rgba(52, 199, 89, 0.1);
            color: var(--green);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .info-card {
            width: 90%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin: 25px 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid #F2F2F7;
        }

        .detail-row:last-child { border-bottom: none; }
        .label { color: var(--secondary); font-size: 14px; }
        .value { color: #1C1C1E; font-size: 14px; font-weight: 600; }

        .terminal {
            width: 90%;
            background: var(--terminal-bg);
            border-radius: 12px;
            padding: 12px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 10px;
            color: #00FF41;
            height: 125px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #logs {
            flex: 1;
            overflow: hidden;
            line-height: 1.5;
        }

        .log-entry {
            display: flex;
            gap: 8px;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .hex-code { color: #00A3FF; }
        .tag { color: rgba(0, 255, 65, 0.6); }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #00FF41;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .footer {
            width: 100%;
            padding: 15px 20px 40px 20px;
            text-align: center;
            color: var(--secondary);
            font-size: 11px;
            background: var(--bg);
        }
    </style>
</head>
<body>

    <div class="managed-banner">Managed by Meshumar Enterprise</div>

    <div class="main-content">
        <svg class="shield-icon" viewBox="0 0 24 24">
            <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.99h7c-.47 4.29-3.14 8.1-7 9.3V12H5V6.3l7-3.11v8.8z"/>
        </svg>

        <h1 class="hebrew-status">משומר</h1>
        <div class="status-badge">PROTECTION ENABLED</div>

        <div class="info-card">
            <div class="detail-row"><span class="label">Policy</span><span class="value">Strict_v6.2</span></div>
            <div class="detail-row"><span class="label">Status</span><span class="value" style="color:var(--green)">Active/Locked</span></div>
            <div class="detail-row"><span class="label">Session</span><span class="value" id="uptime">0s</span></div>
        </div>

        <div class="terminal">
            <div id="logs">
                <div class="log-entry"><span class="hex-code">0x4F12</span> <span class="tag">[SYS]</span> <span>Kernel_Watchdog_Init</span></div>
                <div class="log-entry"><span class="hex-code">0xBC88</span> <span class="tag">[NET]</span> <span>Handshake_Validated</span></div>
            </div>
            <div style="color: #FFF; border-top: 1px solid #222; padding-top: 4px; margin-top: auto;">
                root@meshumar:~$ <span class="cursor"></span>
            </div>
        </div>
    </div>

    <div class="footer">
        <strong>Org ID:</strong> MSH-ENT-2026-SEARCH-TECH<br>
    </div>

    <script>
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        let sec = 0;
        setInterval(() => {
            sec++;
            document.getElementById('uptime').innerText = sec + 's';
        }, 1000);

        const messages = [
            "Syncing_Thread_04",
            "Inspecting_Packet_Headers",
            "Memory_Block_Verified",
            "Cert_Authority_Confirmed",
            "Refreshing_Rule_Set",
            "Bypass_Attempt_Denied",
            "Analyzing_Request_Origin",
            "Data_Stream_Encrypted",
            "Resource_Shield_Active",
            "Protocol_Sequence_Match"
        ];

        const tags = ["[SYS]", "[NET]", "[SEC]", "[FLT]"];

        const logBox = document.getElementById('logs');
        
        setInterval(() => {
            const hex = "0x" + Math.floor(Math.random()*0xFFFF).toString(16).toUpperCase();
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const tag = tags[Math.floor(Math.random() * tags.length)];
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `<span class="hex-code">${hex}</span> <span class="tag">${tag}</span> <span>${msg}</span>`;
            
            logBox.appendChild(logEntry);

            if (logBox.children.length > 5) {
                logBox.removeChild(logBox.firstChild);
            }
        }, 2800); // Slightly faster updates for a "busy" feel
    </script>
</body>
</html>
